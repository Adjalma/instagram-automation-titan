# Cron de publicação — executa a cada 5 minutos via GitHub Actions (gratuito)
# Chama o endpoint /api/cron/publish da Vercel com autenticação por CRON_SECRET

name: Cron — Publicar Posts

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: # permite disparar manualmente

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Chamar endpoint de publicação
        run: |
          curl -s -o response.json -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_APP_URL }}/api/cron/publish" > http_code.txt
          HTTP_CODE=$(cat http_code.txt)
          echo "HTTP Status: $HTTP_CODE"
          cat response.json
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Erro: HTTP $HTTP_CODE"
            exit 1
          fi
